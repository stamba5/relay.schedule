<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Relay Schedule — Sign In</title>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    background: #1e293b;
    padding: 2.5rem 3rem;
    border-radius: 14px;
    text-align: center;
    max-width: 360px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  h1 { font-size: 1.25rem; margin-bottom: 0.25rem; }
  p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 1.5rem; }
  #error {
    color: #f87171;
    margin-top: 1.25rem;
    font-size: 0.85rem;
    display: none;
  }
  #g_id_signin_container { display: flex; justify-content: center; }
</style>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div class="card">
    <h1>Relay Schedule</h1>
    <p>Sign in with your Relay Google account to view your shifts.</p>

    <!-- Replace YOUR_GOOGLE_CLIENT_ID with the client ID from Google Cloud Console -->
    <div id="g_id_onload"
         data-client_id="674173028713-aitlbci77gboovjjkrsejnki4e0bafpf.apps.googleusercontent.com"
         data-callback="handleCredentialResponse">
    </div>
    <div id="g_id_signin_container">
      <div class="g_id_signin" data-type="standard" data-theme="filled_black"></div>
    </div>

    <p id="error">That Google account isn't authorized for this schedule. Contact your team lead.</p>
  </div>

  <script>
    async function handleCredentialResponse(response) {
      const errorEl = document.getElementById('error');
      errorEl.style.display = 'none';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ credential: response.credential }),
        });

        if (res.ok) {
          window.location.href = '/schedule.html';
          return;
        }

        let detail = '';
        try {
          const data = await res.json();
          detail = data && data.error ? data.error : '';
        } catch {}
        errorEl.textContent =
          'Sign-in failed (' + res.status + (detail ? ': ' + detail : '') + '). Tell your team lead this exact message.';
        errorEl.style.display = 'block';
      } catch (err) {
        console.error('Login request failed:', err);
        errorEl.textContent = 'Sign-in request failed — check your connection and try again.';
        errorEl.style.display = 'block';
      }
    }
  </script>
</body>
</html>
